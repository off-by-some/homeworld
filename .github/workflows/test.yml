name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: "${{ matrix.distro }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: arch
            dockerfile: .github/docker/Dockerfile.arch
          - distro: debian
            dockerfile: .github/docker/Dockerfile.debian
          - distro: ubuntu
            dockerfile: .github/docker/Dockerfile.ubuntu
          - distro: fedora
            dockerfile: .github/docker/Dockerfile.fedora

    steps:
      - uses: actions/checkout@v4

      - name: Show checked-out revision
        run: |
          git rev-parse HEAD
          git log -1 --oneline
          nl -ba lib/homeworld/module.sh | sed -n '54,75p'
          sh -n lib/homeworld/module.sh && echo "sh -n: OK"
          bash -n lib/homeworld/module.sh && echo "bash -n: OK"

      - name: Build and test (${{ matrix.distro }})
        run: docker build --no-cache -f ${{ matrix.dockerfile }} .

  macos:
    name: macos
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show checked-out revision
        run: |
          git rev-parse HEAD
          git log -1 --oneline
          nl -ba lib/homeworld/module.sh | sed -n '54,75p'
          sh -n lib/homeworld/module.sh && echo "sh -n: OK"
          bash -n lib/homeworld/module.sh && echo "bash -n: OK"

      - name: Install dependencies
        run: brew install git ncurses

      - name: Install homeworld
        run: sh install.sh
