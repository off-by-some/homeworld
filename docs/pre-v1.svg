<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-labelledby="title desc">
  <title id="title">Homeworld is under construction</title>
  <desc id="desc">Homeworld is pre-version-one software under active development. Concepts and interfaces may change suddenly. Pin the exact commit when using Homeworld.</desc>

  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0A20"/>
      <stop offset="55%" stop-color="#161030"/>
      <stop offset="100%" stop-color="#241539"/>
    </linearGradient>
    <linearGradient id="frameStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7BC4" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#A78BFA" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E3A6D8" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="sphere" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F3EDFF"/>
      <stop offset="78%" stop-color="#CDBCF2"/>
      <stop offset="100%" stop-color="#A48DDE"/>
    </radialGradient>
    <radialGradient id="sphereGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E9DFFF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#B79DEF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B79DEF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C9B6F2"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="clip">
      <rect x="3" y="3" width="1274" height="334" rx="28"/>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="1276" height="336" rx="29" fill="url(#panel)"/>
  <rect x="2.75" y="2.75" width="1274.5" height="334.5" rx="28.5" fill="none" stroke="url(#frameStroke)" stroke-width="1.5"/>

  <g clip-path="url(#clip)">
    <!-- Light rays sweeping from the sphere -->
    <polygon points="240,60 1280,0 1280,44 300,140" fill="url(#ray)" opacity="0.75"/>
    <polygon points="250,120 1280,120 1280,150 300,175" fill="url(#ray)" opacity="0.55"/>

    <!-- Starfield -->
    <g fill="#EDE6FF">
      <circle cx="560" cy="52" r="1.4" opacity="0.7"/>
      <circle cx="705" cy="96" r="1.1" opacity="0.5"/>
      <circle cx="840" cy="40" r="1.6" opacity="0.8"/>
      <circle cx="985" cy="74" r="1.1" opacity="0.5"/>
      <circle cx="1210" cy="150" r="1.3" opacity="0.6"/>
      <circle cx="565" cy="316" r="1.2" opacity="0.5"/>
      <circle cx="900" cy="312" r="1.5" opacity="0.6"/>
      <circle cx="1120" cy="288" r="1.1" opacity="0.5"/>
      <path d="M1058 42 l2.2 5.8 5.8 2.2 -5.8 2.2 -2.2 5.8 -2.2 -5.8 -5.8 -2.2 5.8 -2.2 Z" opacity="0.85"/>
      <path d="M1078 234 l1.8 4.6 4.6 1.8 -4.6 1.8 -1.8 4.6 -1.8 -4.6 -4.6 -1.8 4.6 -1.8 Z" opacity="0.6"/>
      <path d="M1236 66 l1.6 4.2 4.2 1.6 -4.2 1.6 -1.6 4.2 -1.6 -4.2 -4.2 -1.6 4.2 -1.6 Z" opacity="0.7"/>
    </g>

    <!-- Distant moons -->
    <circle cx="1198" cy="58" r="14" fill="#B9A6E4" opacity="0.35"/>
    <path d="M1198 44 a14 14 0 0 1 0 28 a11 14 0 0 0 0 -28 Z" fill="#E7DDFB" opacity="0.5"/>
    <circle cx="1246" cy="102" r="6" fill="#9F8BD0" opacity="0.3"/>

    <!-- Ringed sphere -->
    <g transform="translate(210 170)">
      <circle r="128" fill="url(#sphereGlow)" filter="url(#soft)"/>
      <circle r="78" fill="url(#sphere)"/>
      <circle r="78" fill="none" stroke="#B6A2E6" stroke-width="1.2" opacity="0.55"/>
      <ellipse rx="126" ry="30" fill="none" stroke="#E6DCFA" stroke-width="2.5" opacity="0.9" transform="rotate(-10)"/>
      <ellipse rx="126" ry="30" fill="none" stroke="#8F7AC8" stroke-width="1" opacity="0.6" transform="rotate(-10) translate(0 5)"/>
      <ellipse rx="104" ry="22" fill="none" stroke="#CDBCF0" stroke-width="1.2" opacity="0.5" transform="rotate(-10)"/>
      <!-- Spire -->
      <path d="M0 -64 L0 -126" stroke="#F4EEFF" stroke-width="1.6" opacity="0.9"/>
      <path d="M0 -144 l5 10 -5 10 -5 -10 Z" fill="#FFFFFF" opacity="0.95"/>
      <circle cx="-22" cy="-22" r="11" fill="#FFFFFF" opacity="0.4"/>
      <circle cx="24" cy="30" r="18" fill="#8F76CE" opacity="0.18"/>
    </g>

    <!-- Content column -->
    <g transform="translate(430 0)" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <!-- Badge with flanking rules -->
      <g fill="#C9B8F0">
        <line x1="0" y1="80" x2="58" y2="80" stroke="#8F7AC8" stroke-width="1" opacity="0.55"/>
        <path d="M72 76 l4 4 -4 4 -4 -4 Z" opacity="0.9"/>
        <text x="96" y="85" font-size="13" font-weight="600" letter-spacing="4">PRE-V1  ·  UNDER CONSTRUCTION</text>
        <line x1="446" y1="80" x2="516" y2="80" stroke="#8F7AC8" stroke-width="1" opacity="0.55"/>
      </g>

      <!-- Headline -->
      <text x="0" y="150" font-size="28" font-weight="600" letter-spacing="5" fill="url(#headline)">HOMEWORLD IS STILL BEING BUILT</text>

      <!-- Divider with center diamond -->
      <g opacity="0.75">
        <line x1="0" y1="178" x2="356" y2="178" stroke="#8F7AC8" stroke-width="1"/>
        <path d="M368 178 l6 -6 6 6 -6 6 Z" fill="#C9B8F0"/>
        <line x1="392" y1="178" x2="748" y2="178" stroke="#8F7AC8" stroke-width="1"/>
      </g>

      <!-- Body -->
      <text x="0" y="216" font-size="16.5" font-weight="400" letter-spacing="0.4" fill="#B4A8D6">
        <tspan x="0" dy="0">Homeworld is being tested on real machines, so concepts and interfaces may</tspan>
        <tspan x="0" dy="27">change suddenly. The documentation describes how it works today, but those</tspan>
        <tspan x="0" dy="27">promises may still evolve before version 1.</tspan>
      </text>
    </g>
  </g>
</svg>